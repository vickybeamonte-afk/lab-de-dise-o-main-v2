<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar Compra - Starbucks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend+Deca:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="cart.js"></script>
</head>

<body class="pagina-interior">
  <nav class="barra-navegacion">
    <div class="logo-marca">
      <a href="index.html"><img src="imagenes/Starbuckslogo.png" alt="Starbucks Logo" /></a>
    </div>
    <div class="nav-derecha">
      <a href="checkout.html" class="nav-carrito" aria-label="Ver carrito">
        🛒<span class="cart-badge" id="cartBadge" hidden>0</span>
      </a>
      <button class="menu-hamburguesa" id="btnMenu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="overlay" id="overlay"></div>
  <div class="menu-lateral" id="menuLateral">
    <div class="menu-lateral-header">
      <button class="btn-cerrar" id="btnCerrar">&#215;</button>
    </div>
    <nav class="menu-lateral-nav">
      <a href="index.html">Home</a>
      <a href="productos.html">Nuestros Productos</a>
      <a href="nosotros.html">Sobre Nosotros</a>
      <a href="experiencia.html">Experiencia Starbucks</a>
      <a href="contactanos.html">Contáctanos</a>
    </nav>
  </div>

  <section class="seccion-checkout">
    <h2 class="archivo-black-regular titulo-checkout">FINALIZÁ TU COMPRA</h2>

    <div class="panel-compra">
      <div class="campo-direccion">
        <label>Dirección</label>
        <input type="text" class="input-direccion" />
      </div>

      <div class="campo-pago">
        <p class="subtitulo-pago">Medios de pago</p>
        <label class="fila-pago">
          <input type="radio" name="pago" checked />
          Tarjeta
        </label>
        <label class="fila-pago">
          <input type="radio" name="pago" />
          Transferencia
        </label>
      </div>

      <div class="resumen-compra">
        <p class="subtitulo-pago">Resumen de compra</p>
        <div id="resumen-items"></div>
        <div id="carrito-vacio" class="carrito-vacio" hidden>
          <p>Tu carrito está vacío.</p>
          <a href="productos.html" class="boton-verde"
            style="display:inline-block;margin-top:8px;text-decoration:none;">Ver productos</a>
        </div>
      </div>

      <div class="total-caja">
        <span>Total</span>
        <span id="total-valor">$0</span>
      </div>

      <div class="checkout-acciones">
        <button class="boton-pagar" id="btnPagar" disabled>Pagar y finalizar</button>
      </div>

      <div id="mensaje-exito" class="mensaje-exito" hidden>
        <p>¡Gracias por tu compra! ☕</p>
      </div>
    </div>

    <div class="ilustracion-checkout">
      <img src="imagenes/checkout-ilustracion.png" alt="Persona comprando online" />
    </div>
  </section>

  <script>
    const resumenEl = document.getElementById('resumen-items');
    const totalEl = document.getElementById('total-valor');
    const btnPagar = document.getElementById('btnPagar');
    const carritoVacio = document.getElementById('carrito-vacio');
    const mensajeExito = document.getElementById('mensaje-exito');

    function mostrarCarrito() {
      const items = Carrito.obtenerCarrito();
      let html = '';

      if (items.length === 0) {
        resumenEl.innerHTML = '';
        carritoVacio.hidden = false;
        totalEl.textContent = '$0';
        btnPagar.disabled = true;
        return;
      }

      carritoVacio.hidden = true;
      btnPagar.disabled = false;

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        html += '<div class="resumen-fila">';
        html += '<span class="resumen-nombre">' + item.nombre + ' x' + item.cantidad + '</span>';
        html += '<span class="resumen-precio">' + Carrito.formatearPrecio(item.precio * item.cantidad) + '</span>';
        html += '<button class="btn-remove" data-id="' + item.id + '">✕</button>';
        html += '</div>';
      }

      resumenEl.innerHTML = html;
      totalEl.textContent = Carrito.formatearPrecio(Carrito.totalCarrito());

      const botonesRemove = resumenEl.getElementsByClassName('btn-remove');
      for (let i = 0; i < botonesRemove.length; i++) {
        botonesRemove[i].onclick = function () {
          Carrito.eliminarItem(this.dataset.id);
        };
      }
    }

    btnPagar.onclick = function () {
      if (Carrito.contarItems() === 0) return;
      Carrito.vaciarCarrito();
      mensajeExito.hidden = false;
      btnPagar.disabled = true;
    };

    window.addEventListener('carrito:cambio', mostrarCarrito);
    mostrarCarrito();
  </script>

  <div class="separador">
    <span></span>
    <img class="logo-separador" src="imagenes/Starbuckslogocirculo.png" alt="Logo Starbucks" />
    <span></span>
  </div>
  <div class="redes-sociales">
    <a href="https://www.facebook.com/Starbucks" target="_blank" rel="noopener"><img src="imagenes/Facebook.png"
        class="icono-red" alt="Facebook" /></a>
    <a href="https://www.instagram.com/starbucks" target="_blank" rel="noopener"><img src="imagenes/Instagram.png"
        class="icono-red" alt="Instagram" /></a>
    <a href="https://www.linkedin.com/company/starbucks" target="_blank" rel="noopener"><img src="imagenes/Linkedin.png"
        class="icono-red" alt="LinkedIn" /></a>
  </div>
  <footer class="pie-pagina">
    <div class="links-finales">
      <a href="index.html">Home</a>
      <a href="productos.html">Nuestros Productos</a>
      <a href="nosotros.html">Sobre Nosotros</a>
      <a href="experiencia.html">Experiencia Starbucks</a>
      <a href="contactanos.html">Contáctanos</a>
    </div>
  </footer>

  <script>
    document.getElementById("btnMenu").onclick = function () {
      document.getElementById("menuLateral").classList.add("activo");
      document.getElementById("overlay").classList.add("activo");
    };
    document.getElementById("btnCerrar").onclick = function () {
      document.getElementById("menuLateral").classList.remove("activo");
      document.getElementById("overlay").classList.remove("activo");
    };
    document.getElementById("overlay").onclick = function () {
      document.getElementById("menuLateral").classList.remove("activo");
      document.getElementById("overlay").classList.remove("activo");
    };

    function actualizarBadge() {
      const badge = document.getElementById("cartBadge");
      const count = Carrito.contarItems();
      if (count > 0) {
        badge.textContent = count;
        badge.hidden = false;
      } else {
        badge.hidden = true;
      }
    }

    actualizarBadge();
    window.addEventListener("carrito:cambio", actualizarBadge);
  </script>
</body>

</html>
